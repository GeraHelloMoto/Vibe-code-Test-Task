<!DOCTYPE html>
<html>
<head>
    <title>Создание заявки</title>
</head>
<body>
    <h1>Новая заявка</h1>
    <form id="requestForm">
        <label>Имя клиента:</label><br>
        <input type="text" id="clientName" required><br>
        <label>Телефон:</label><br>
        <input type="text" id="phone" required><br>
        <label>Адрес:</label><br>
        <input type="text" id="address" required><br>
        <label>Описание проблемы:</label><br>
        <textarea id="problemText" required></textarea><br><br>
        <button type="submit">Отправить</button>
    </form>
    <div id="message"></div>
    <br>
    <a href="/static/dispatcher.html">Панель диспетчера</a> |
    <a href="/static/master.html">Панель мастера</a>

    <script>
        document.getElementById('requestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                clientName: document.getElementById('clientName').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                problemText: document.getElementById('problemText').value
            };
            const response = await fetch('/api/requests/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await response.json();
            if (response.ok) {
                document.getElementById('message').innerHTML = 'Заявка создана! ID: ' + result.id;
                document.getElementById('requestForm').reset();
            } else {
                document.getElementById('message').innerHTML = 'Ошибка: ' + JSON.stringify(result);
            }
        });
    </script>
</body>
</html>
